<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghostreel — faceless video studio</title>
  <style>
    :root { --bg:#0a0a0f; --card:#12121a; --line:rgba(255,255,255,.07); --violet:#8b5cf6; --muted:#8b8b9a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:#ececf1; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:960px; margin:0 auto; padding:40px 20px 80px; }
    h1 { font-size:26px; margin:0 0 4px; letter-spacing:-.02em; }
    h1 span { color:var(--violet); }
    .sub { color:var(--muted); margin:0 0 28px; font-size:14px; }
    .bar { display:flex; gap:10px; margin-bottom:26px; }
    input { flex:1; background:#0a0a0f; border:1px solid #2a2a38; border-radius:12px; padding:13px 16px; color:#fff; font-size:15px; outline:none; }
    input:focus { border-color:var(--violet); }
    button { background:var(--violet); border:none; color:#fff; font-weight:600; padding:13px 22px; border-radius:12px; cursor:pointer; font-size:15px; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .status { display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 18px; margin-bottom:22px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--violet); animation:pulse 1.3s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .done .dot { background:#22c55e; animation:none; } .failed .dot { background:#ef4444; animation:none; }
    .step { font-weight:600; text-transform:capitalize; }
    .badge { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
    .badge.heal { color:#f59e0b; border-color:rgba(245,158,11,.4); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .seg { background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .seg img { width:100%; aspect-ratio:16/9; object-fit:cover; background:#000; display:block; }
    .seg .ph { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; background:#0e0e16; }
    .seg .body { padding:12px 14px; }
    .seg .narr { font-size:13px; color:#d4d4dc; margin:0 0 8px; }
    .qa { font-size:11px; display:flex; align-items:center; gap:6px; color:var(--muted); }
    .qa .k { padding:2px 8px; border-radius:999px; font-weight:600; }
    .qa .pass { background:rgba(34,197,94,.15); color:#4ade80; } .qa .fail { background:rgba(239,68,68,.15); color:#f87171; }
    details { margin-top:8px; } summary { cursor:pointer; color:var(--muted); font-size:12px; }
    .prov { font-size:11px; color:var(--muted); white-space:pre-wrap; margin-top:6px; }
    video { width:100%; border-radius:14px; border:1px solid var(--line); margin-top:6px; }
    .result { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:22px; }
    a.dl { display:inline-block; margin-top:10px; color:var(--violet); font-weight:600; text-decoration:none; font-size:14px; }
    .models { font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ghost<span>reel</span></h1>
    <p class="sub">Type a topic. Get a finished faceless video — script, style-locked visuals, voiceover, all self-healing and provenance-tracked.</p>

    <div class="bar">
      <input id="topic" placeholder="e.g. why do cats purr" />
      <button id="go">Generate</button>
    </div>

    <div id="statusRow" class="status" style="display:none">
      <span class="dot"></span>
      <span class="step" id="step">queued</span>
      <span class="badge" id="segCount"></span>
      <span class="badge heal" id="healBadge" style="display:none"></span>
    </div>

    <div id="result" class="result" style="display:none">
      <video id="video" controls></video>
      <a class="dl" id="dl" href="#" download>Download MP4 ↓</a>
      <div class="models" id="models"></div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let timer = null;

    async function start() {
      const topic = $("topic").value.trim();
      if (!topic) return;
      $("go").disabled = true;
      $("grid").innerHTML = "";
      $("result").style.display = "none";
      $("statusRow").style.display = "flex";
      $("step").textContent = "queued";
      try {
        const r = await fetch("/jobs", {
          method: "POST", headers: {"content-type":"application/json"},
          body: JSON.stringify({ topic })
        });
        const { job_id } = await r.json();
        if (timer) clearInterval(timer);
        timer = setInterval(() => poll(job_id), 3000);
        poll(job_id);
      } catch (e) {
        $("step").textContent = "failed to start: " + e;
        $("go").disabled = false;
      }
    }

    async function poll(id) {
      let d;
      try { d = await (await fetch(`/jobs/${id}/media`)).json(); }
      catch { return; }

      const row = $("statusRow");
      row.className = "status " + (d.status === "done" ? "done" : d.status === "failed" ? "failed" : "");
      $("step").textContent = d.status === "done" ? "done" : d.status === "failed" ? ("failed — " + (d.error||"")) : ("working · " + d.step);
      $("segCount").textContent = (d.segments?.length || 0) + " segments";
      if (d.retries > 0) { $("healBadge").style.display = ""; $("healBadge").textContent = "⟳ " + d.retries + " self-healed"; }

      renderSegments(d.segments || []);

      if (d.status === "done" || d.status === "failed") {
        clearInterval(timer); timer = null; $("go").disabled = false;
        if (d.video) {
          $("result").style.display = "block";
          $("video").src = d.video; $("dl").href = d.video;
          if (d.models) $("models").textContent = "models · " + Object.entries(d.models).map(([k,v])=>k+": "+v).join("  ·  ");
        }
      }
    }

    function renderSegments(segs) {
      $("grid").innerHTML = segs.map(s => {
        const img = s.image
          ? `<img src="${s.image}" alt="segment ${s.index}" />`
          : `<div class="ph">${s.qa_passed === false ? "generating…" : "…"}</div>`;
        const qa = s.qa_passed == null ? "" :
          `<div class="qa"><span class="k ${s.qa_passed ? "pass":"fail"}">${s.qa_passed ? "QA pass":"QA fail"}</span>
             ${s.attempts>1 ? `<span>· ${s.attempts} tries</span>`:""}</div>`;
        return `<div class="seg">${img}
          <div class="body">
            <p class="narr">${escapeHtml(s.narration || "")}</p>
            ${qa}
            <details><summary>provenance</summary>
              <div class="prov">prompt: ${escapeHtml(s.image_prompt || s.visual || "")}
${s.qa_reason ? "\nqa: " + escapeHtml(s.qa_reason) : ""}</div>
            </details>
          </div></div>`;
      }).join("");
    }

    function escapeHtml(t){ const d=document.createElement("div"); d.textContent=t; return d.innerHTML; }

    $("go").addEventListener("click", start);
    $("topic").addEventListener("keydown", (e) => { if (e.key === "Enter") start(); });
  </script>
</body>
</html>
