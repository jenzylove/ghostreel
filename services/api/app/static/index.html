<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghostreel — faceless video studio</title>
  <style>
    :root { --bg:#0a0a0f; --card:#12121a; --line:rgba(255,255,255,.07); --violet:#8b5cf6; --muted:#8b8b9a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:#ececf1; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:980px; margin:0 auto; padding:40px 20px 80px; }
    h1 { font-size:26px; margin:0 0 4px; letter-spacing:-.02em; } h1 span { color:var(--violet); }
    .sub { color:var(--muted); margin:0 0 24px; font-size:14px; }
    .bar { display:flex; gap:10px; margin-bottom:14px; }
    input[type=text] { flex:1; background:#0a0a0f; border:1px solid #2a2a38; border-radius:12px; padding:13px 16px; color:#fff; font-size:15px; outline:none; }
    input[type=text]:focus { border-color:var(--violet); }
    button { background:var(--violet); border:none; color:#fff; font-weight:600; padding:13px 22px; border-radius:12px; cursor:pointer; font-size:15px; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .controls { display:flex; gap:14px; flex-wrap:wrap; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 16px; margin-bottom:22px; font-size:13px; }
    .controls label { color:var(--muted); display:flex; align-items:center; gap:7px; }
    select, input[type=number] { background:#0a0a0f; border:1px solid #2a2a38; border-radius:9px; padding:7px 10px; color:#fff; font-size:13px; outline:none; }
    .status { display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 18px; margin-bottom:22px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--violet); animation:pulse 1.3s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .done .dot { background:#22c55e; animation:none; } .failed .dot { background:#ef4444; animation:none; } .review .dot { background:#f59e0b; animation:none; }
    .step { font-weight:600; text-transform:capitalize; }
    .badge { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
    .badge.heal { color:#f59e0b; border-color:rgba(245,158,11,.4); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
    .seg { background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .seg img { width:100%; aspect-ratio:16/9; object-fit:cover; background:#000; display:block; }
    .seg .ph { width:100%; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; background:#0e0e16; }
    .seg .body { padding:12px 14px; }
    .seg .narr { font-size:13px; color:#d4d4dc; margin:0 0 6px; }
    .seg .timing { font-size:11px; color:var(--muted); margin:0 0 6px; }
    .qa { font-size:11px; display:flex; align-items:center; gap:6px; color:var(--muted); }
    .qa .k { padding:2px 8px; border-radius:999px; font-weight:600; }
    .qa .regen { background:rgba(245,158,11,.15); color:#f59e0b; }
    details { margin-top:8px; } summary { cursor:pointer; color:var(--muted); font-size:12px; }
    .prov { font-size:11px; color:var(--muted); white-space:pre-wrap; margin-top:6px; }
    video { width:100%; border-radius:14px; border:1px solid var(--line); margin-top:6px; }
    .result, .reviewbar { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:22px; }
    .reviewbar { border-color:rgba(245,158,11,.35); }
    .reviewbar-top { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px; }
    textarea.narr-edit { width:100%; background:#0a0a0f; border:1px solid #2a2a38; border-radius:10px; color:#ececf1; font:14px/1.6 inherit; padding:12px; resize:vertical; min-height:220px; outline:none; }
    textarea.narr-edit:focus { border-color:var(--violet); }
    .record-row { display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
    .record-row label { font-size:13px; color:var(--muted); }
    a.dl { display:inline-block; margin-top:10px; color:var(--violet); font-weight:600; text-decoration:none; font-size:14px; }
    .models { font-size:11px; color:var(--muted); margin-top:8px; }
    /* YouTube package */
    .ytpkg { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:22px; }
    .ytpkg-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .ytpkg-title { font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .ytpkg-layout { display:grid; grid-template-columns:160px 1fr; gap:16px; }
    @media(max-width:600px){ .ytpkg-layout { grid-template-columns:1fr; } }
    .ytpkg-thumb { width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:8px; border:1px solid var(--line); background:#0e0e16; display:block; }
    .ytpkg-thumb-ph { width:100%; aspect-ratio:16/9; border-radius:8px; background:#0e0e16; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; }
    .ytpkg-fields { display:flex; flex-direction:column; gap:10px; }
    .ytfield { display:flex; flex-direction:column; gap:4px; }
    .ytfield-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    .ytfield-val { font-size:13px; color:#d4d4dc; background:#0a0a0f; border:1px solid #2a2a38; border-radius:8px; padding:8px 10px; white-space:pre-wrap; line-height:1.5; }
    .ytfield-row { display:flex; align-items:flex-start; gap:8px; }
    .ytfield-row .ytfield { flex:1; }
    .tags { display:flex; flex-wrap:wrap; gap:6px; }
    .tag { font-size:12px; background:#1a1a26; border:1px solid #2a2a38; border-radius:999px; padding:3px 10px; color:#b7b7c4; }
    .copy-btn { background:none; border:1px solid #2a2a38; color:var(--muted); font-size:12px; padding:4px 10px; border-radius:8px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .copy-btn:hover { border-color:var(--violet); color:#fff; }
    .copy-btn.copied { border-color:#22c55e; color:#4ade80; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ghost<span>reel</span></h1>
    <p class="sub">Type a topic. Get a finished faceless video — script, style-locked visuals, voiceover; self-healing and provenance-tracked.</p>

    <div class="bar">
      <input type="text" id="topic" placeholder="e.g. why the Roman Empire fell" />
      <button id="go">Generate</button>
    </div>

    <div class="controls">
      <label>Style <select id="style"></select></label>
      <label id="customWrap" style="display:none">Reference <input type="file" id="ref" accept="image/*" multiple /></label>
      <span id="refStatus" class="badge" style="display:none"></span>
      <label>Mode <select id="mode"><option value="tts">AI voice</option><option value="byo">My recording</option></select></label>
      <label id="voiceWrap">Voice <select id="voice"></select></label>
      <label>Length
        <select id="length">
          <option value="2">2 min</option>
          <option value="4" selected>4 min</option>
          <option value="6">6 min</option>
          <option value="8">8 min</option>
        </select>
      </label>
      <label><input type="checkbox" id="captions" checked /> Captions</label>
      <label><input type="checkbox" id="review" checked /> Review</label>
      <label><input type="checkbox" id="prov" /> Show provenance</label>
      <label id="codeWrap" style="display:none">Access code <input type="password" id="code" style="width:120px" /></label>
    </div>

    <div id="statusRow" class="status" style="display:none">
      <span class="dot"></span>
      <span class="step" id="step">queued</span>
      <span class="badge" id="beatCount"></span>
      <span class="badge heal" id="healBadge" style="display:none"></span>
    </div>

    <div id="reviewbar" class="reviewbar" style="display:none">
      <div class="reviewbar-top">
        <span id="reviewMsg">Review &amp; edit the narration below, then render.</span>
        <button id="approve">Approve &amp; Render</button>
      </div>
      <textarea id="narration-edit" class="narr-edit" placeholder="Loading narration…"></textarea>
      <div id="recordWrap" class="record-row" style="display:none">
        <label>Your recording of this narration:</label>
        <input type="file" id="recording" accept="audio/*" />
      </div>
    </div>

    <div id="result" class="result" style="display:none">
      <video id="video" controls></video>
      <a class="dl" id="dl" href="#" download>Download MP4 ↓</a>
      <div class="models" id="models"></div>
    </div>

    <div id="ytpkg" class="ytpkg" style="display:none">
      <div class="ytpkg-header">
        <span class="ytpkg-title">YouTube Package</span>
        <button class="copy-btn" id="copyAll" onclick="copyAllYt()">Copy all ↗</button>
      </div>
      <div class="ytpkg-layout">
        <div id="thumbWrap">
          <div class="ytpkg-thumb-ph" id="thumbPh">generating…</div>
        </div>
        <div class="ytpkg-fields">
          <div class="ytfield-row">
            <div class="ytfield">
              <div class="ytfield-label">Title</div>
              <div class="ytfield-val" id="ytTitle">—</div>
            </div>
            <button class="copy-btn" onclick="copyField('ytTitle')">Copy</button>
          </div>
          <div class="ytfield-row">
            <div class="ytfield">
              <div class="ytfield-label">Description</div>
              <div class="ytfield-val" id="ytDesc">—</div>
            </div>
            <button class="copy-btn" onclick="copyField('ytDesc')">Copy</button>
          </div>
          <div class="ytfield-row">
            <div class="ytfield">
              <div class="ytfield-label">Tags</div>
              <div class="tags" id="ytTags"></div>
            </div>
            <button class="copy-btn" onclick="copyTags()">Copy</button>
          </div>
        </div>
      </div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let timer = null, currentJob = null, reviewing = false, currentMode = "tts";
    let _narrationPopulated = false;

    const codeVal = () => localStorage.getItem("ghostreel_code") || "";
    const jsonHeaders = () => ({ "content-type": "application/json", "X-Access-Code": codeVal() });

    async function loadOptions() {
      try {
        const presets = await (await fetch("/presets")).json();
        $("style").innerHTML = presets.map(p => `<option value="${p.id}">${p.id}</option>`).join("")
          + '<option value="custom">custom (from image)</option>';
        const voices = await (await fetch("/voices")).json();
        $("voice").innerHTML = voices.map(v => `<option value="${v.id}">${v.name}</option>`).join("");
      } catch {}
      try {
        const h = await (await fetch("/health")).json();
        if (h.gated) {
          $("codeWrap").style.display = "flex";
          $("code").value = codeVal();
          $("code").addEventListener("input", () => localStorage.setItem("ghostreel_code", $("code").value));
        }
      } catch {}
    }

    async function start() {
      const topic = $("topic").value.trim();
      if (!topic) return;
      $("go").disabled = true; reviewing = false; _narrationPopulated = false;
      $("grid").innerHTML = "";
      $("result").style.display = "none";
      $("reviewbar").style.display = "none";
      $("ytpkg").style.display = "none";
      $("statusRow").style.display = "flex";
      $("step").textContent = "queued";
      $("narration-edit").value = "";
      try {
        const payload = {
          topic,
          voice_mode: $("mode").value,
          style_id: $("style").value,
          voice_id: $("voice").value,
          target_minutes: parseFloat($("length").value) || 4,
          captions: $("captions").checked,
          review: $("review").checked
        };
        if ($("style").value === "custom" && window.customStyle) {
          payload.style_positive = window.customStyle.positive;
          payload.style_negatives = window.customStyle.negatives;
        }
        const r = await fetch("/jobs", { method: "POST", headers: jsonHeaders(), body: JSON.stringify(payload) });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          $("step").textContent = r.status === 401 ? "access code required or invalid"
            : (err.detail || "request failed");
          $("go").disabled = false; return;
        }
        const { job_id } = await r.json();
        currentJob = job_id;
        watch(job_id);
      } catch (e) { $("step").textContent = "failed to start: " + e; $("go").disabled = false; }
    }

    function watch(id) {
      if (timer) clearInterval(timer);
      timer = setInterval(() => poll(id), 3000); poll(id);
    }

    async function poll(id) {
      let d; try { d = await (await fetch(`/jobs/${id}/media`)).json(); } catch { return; }
      currentJob = id;
      const st = d.status;
      $("statusRow").className = "status " + (st === "done" ? "done" : st === "failed" ? "failed" : st === "awaiting_review" ? "review" : "");
      $("step").textContent = st === "done" ? "done"
        : st === "failed" ? ("failed — " + (d.error || ""))
        : st === "awaiting_review" ? "awaiting your review"
        : ("working · " + d.step);
      if (d.beat_count > 0) $("beatCount").textContent = d.beat_count + " beats";
      else if (d.beats?.length) $("beatCount").textContent = d.beats.length + " beats";
      if (d.retries > 0) { $("healBadge").style.display = ""; $("healBadge").textContent = "⟳ " + d.retries + " self-healed"; }

      reviewing = (st === "awaiting_review");
      currentMode = d.voice_mode || "tts";
      $("reviewbar").style.display = reviewing ? "block" : "none";
      if (reviewing) {
        const byo = currentMode === "byo";
        $("recordWrap").style.display = byo ? "flex" : "none";
        $("approve").textContent = byo ? "Record & Render" : "Approve & Render";
        $("reviewMsg").textContent = byo
          ? "Review the narration, record yourself reading it, then upload to render:"
          : "Review & edit the narration below, then render.";
        // Populate textarea once (don't overwrite user edits on subsequent polls).
        if (!_narrationPopulated && d.narration) {
          $("narration-edit").value = d.narration;
          _narrationPopulated = true;
        }
      }

      renderBeats(d.beats || [], reviewing);

      if (st === "done" || st === "failed") {
        clearInterval(timer); timer = null; $("go").disabled = false;
        if (d.video) {
          $("result").style.display = "block";
          $("video").src = d.video; $("dl").href = d.video;
          if (d.models) $("models").textContent = "models · " + Object.entries(d.models).map(([k,v])=>k+": "+v).join("  ·  ");
        }
        renderYtPackage(d);
      }
    }

    function renderBeats(beats, editable) {
      if (editable) {
        // During review: don't render beat cards — user only sees the narration textarea.
        $("grid").innerHTML = "";
        return;
      }
      const showProv = $("prov").checked;
      $("grid").innerHTML = beats.map(b => {
        const media = b.image
          ? `<img src="${b.image}" alt="beat ${b.index}" />`
          : `<div class="ph">${b.attempts > 1 ? "regenerating…" : "…"}</div>`;
        const regen = b.attempts > 1 ? `<div class="qa"><span class="k regen">⟳ regenerated</span></div>` : "";
        const timing = b.start_s != null
          ? `<div class="timing">${fmtTime(b.start_s)} – ${fmtTime(b.end_s)}</div>` : "";
        const prov = showProv
          ? `<details><summary>provenance</summary><div class="prov">prompt: ${escapeHtml(b.image_prompt || b.visual || "")}${b.qa_reason ? "\nqa: " + escapeHtml(b.qa_reason) : ""}</div></details>`
          : "";
        return `<div class="seg">${media}
          <div class="body">${timing}<p class="narr">${escapeHtml(b.text || "")}</p>${regen}${prov}</div></div>`;
      }).join("");
    }

    function fmtTime(s) {
      if (s == null) return "";
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, "0")}`;
    }

    async function approve() {
      if (!currentJob) return;
      const narration = $("narration-edit").value.trim();
      if (currentMode === "byo") {
        if (!$("recording").files.length) { alert("Upload your recording of the narration first"); return; }
        $("approve").disabled = true;
        const fd = new FormData();
        fd.append("audio", $("recording").files[0]);
        if (narration) fd.append("narration", narration);
        try {
          await fetch(`/jobs/${currentJob}/record`, { method: "POST", headers: { "X-Access-Code": codeVal() }, body: fd });
          $("reviewbar").style.display = "none"; $("approve").disabled = false; watch(currentJob);
        } catch { $("approve").disabled = false; }
      } else {
        $("approve").disabled = true;
        try {
          await fetch(`/jobs/${currentJob}/approve`, {
            method: "POST", headers: jsonHeaders(),
            body: JSON.stringify({ narration: narration || null })
          });
          $("reviewbar").style.display = "none"; $("approve").disabled = false; watch(currentJob);
        } catch { $("approve").disabled = false; }
      }
    }

    function renderYtPackage(d) {
      const hasYt = d.yt_title || d.yt_description || (d.yt_tags && d.yt_tags.length);
      if (!hasYt) { $("ytpkg").style.display = "none"; return; }
      $("ytpkg").style.display = "block";
      $("ytTitle").textContent = d.yt_title || "";
      $("ytDesc").textContent = d.yt_description || "";
      $("ytTags").innerHTML = (d.yt_tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
      const tw = $("thumbWrap");
      if (d.thumbnail) {
        tw.innerHTML = `<img class="ytpkg-thumb" src="${d.thumbnail}" alt="thumbnail" />`;
      } else {
        tw.innerHTML = `<div class="ytpkg-thumb-ph">generating…</div>`;
      }
    }

    function copyField(id) {
      const el = $(id); if (!el) return;
      navigator.clipboard.writeText(el.textContent).then(() => flashCopy(event.target));
    }
    function copyTags() {
      const tags = [...$("ytTags").querySelectorAll(".tag")].map(t => t.textContent).join(", ");
      navigator.clipboard.writeText(tags).then(() => flashCopy(event.target));
    }
    function copyAllYt() {
      const title = $("ytTitle").textContent;
      const desc = $("ytDesc").textContent;
      const tags = [...$("ytTags").querySelectorAll(".tag")].map(t => t.textContent).join(", ");
      navigator.clipboard.writeText(`Title:\n${title}\n\nDescription:\n${desc}\n\nTags:\n${tags}`)
        .then(() => flashCopy($("copyAll")));
    }
    function flashCopy(btn) {
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = "Copied ✓"; btn.classList.add("copied");
      setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1800);
    }

    function escapeHtml(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

    $("go").addEventListener("click", start);
    $("topic").addEventListener("keydown", (e) => { if (e.key === "Enter") start(); });
    $("approve").addEventListener("click", approve);

    $("mode").addEventListener("change", () => {
      const byo = $("mode").value === "byo";
      $("voiceWrap").style.display = byo ? "none" : "flex";
      if (byo) $("review").checked = true;
    });

    $("style").addEventListener("change", () => {
      $("customWrap").style.display = $("style").value === "custom" ? "flex" : "none";
      if ($("style").value !== "custom") $("refStatus").style.display = "none";
    });
    $("ref").addEventListener("change", async () => {
      if (!$("ref").files.length) return;
      $("refStatus").style.display = ""; $("refStatus").textContent = "extracting style…";
      const fd = new FormData();
      for (const f of $("ref").files) fd.append("files", f);
      try {
        window.customStyle = await (await fetch("/style/extract", { method:"POST", headers: {"X-Access-Code": codeVal()}, body: fd })).json();
        $("refStatus").textContent = "✓ style captured";
      } catch { $("refStatus").textContent = "extraction failed"; }
    });

    loadOptions();

    const preload = new URLSearchParams(location.search).get("job");
    if (preload) { $("statusRow").style.display = "flex"; currentJob = preload; watch(preload); }
  </script>
</body>
</html>
